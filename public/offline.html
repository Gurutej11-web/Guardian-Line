<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guardian Line — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0e1a;
        color: #e8ecf7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        max-width: 380px;
        padding: 0 24px;
        text-align: center;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        color: #8d97b5;
        line-height: 1.6;
      }
      button {
        margin-top: 24px;
        border-radius: 999px;
        background: #2f5cc7;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Guardian Line couldn't reach the network. Your saved reports and settings are stored on this device, so
        they'll still be here once you're back online.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
